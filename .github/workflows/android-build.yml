name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Initialize Web Project
        run: |
          echo '{"name": "bijoy-converter-pro", "version": "1.0.0", "dependencies": {"@capacitor/core": "^6.0.0", "@capacitor/android": "^6.0.0"}, "devDependencies": {"@capacitor/cli": "^6.0.0"}}' > package.json
          npm install

      - name: Configure Capacitor Android App
        run: |
          npx cap init "Bijoy Converter Pro" "com.nibrasit.bijoyconverter" --web-dir=.
          npx cap add android
          
          # অ্যান্ড্রয়েড প্রজেক্টের জন্য প্রয়োজনীয় মিনিমাম কনফিগারেশন জেনারেট করা
          mkdir -p android/app/src/main/assets
          npx cap sync

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Bijoy-Converter-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
