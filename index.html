<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bijoy Converter Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700&family=Cinzel+Decorative:wght@700;900&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* ── Dark palette ── */
  --bg:#07080f;
  --surface:#0f1020;
  --surface2:#161829;
  --surface3:#1d2038;
  --border:#252845;
  --border-hi:#363a62;
  --em:#7c3aed;           
  --em2:#6d28d9;
  --em3:#a78bfa;
  --accent:#06b6d4;       
  --accent2:#0891b2;
  --rose:#f43f5e;         
  --gold:#e879f9;         
  --gold2:#d946ef;
  --text:#eaedf8;
  --muted:#6e748f;
  --dim:#303558;
  --red:#f43f5e;
  --radius:18px;

  --g1:linear-gradient(135deg,#7c3aed 0%,#06b6d4 50%,#e879f9 100%);
  --g2:linear-gradient(90deg,#7c3aed,#06b6d4,#e879f9);
  --g3:linear-gradient(135deg,#6d28d9 0%,#0891b2 100%);

  --header-bg:linear-gradient(160deg,#05060e 0%,#0b0d1c 50%,#05060e 100%);
  --card-bg:linear-gradient(145deg,#12152a 0%,#0d1018 100%);
  --toolbar-bg:linear-gradient(180deg,#191c30 0%,#141728 100%);
  --popup-bg:linear-gradient(145deg,#13162a 0%,#0e1020 100%);
  --popup-head-bg:linear-gradient(180deg,#191d32 0%,#141828 100%);
  --toggle-inner:#0b0d1e;
  --toggle-inner-hover:#0f1125;
  --overlay-bg:rgba(4,5,12,.8);
}

html.light{
  /* ── Light palette ── */
  --bg:#f3f4ff;
  --surface:#ffffff;
  --surface2:#f0f1ff;
  --surface3:#e8eafe;
  --border:#d0d3f0;
  --border-hi:#b0b4e0;
  --em:#7c3aed;
  --em2:#6d28d9;
  --em3:#a78bfa;
  --accent:#0891b2;
  --accent2:#0e7490;
  --rose:#f43f5e;
  --gold:#d946ef;
  --gold2:#c026d3;
  --text:#18193a;
  --muted:#565882;
  --dim:#a0a3c4;
  --red:#e11d48;

  --g1:linear-gradient(135deg,#7c3aed 0%,#06b6d4 50%,#e879f9 100%);
  --g2:linear-gradient(90deg,#7c3aed,#06b6d4,#e879f9);
  --g3:linear-gradient(135deg,#6d28d9 0%,#0891b2 100%);

  --header-bg:linear-gradient(160deg,#eceeff 0%,#f5f5ff 50%,#eceeff 100%);
  --card-bg:linear-gradient(145deg,#ffffff 0%,#f7f8ff 100%);
  --toolbar-bg:linear-gradient(180deg,#ededff 0%,#e8eaff 100%);
  --popup-bg:linear-gradient(145deg,#ffffff 0%,#f5f5ff 100%);
  --popup-head-bg:linear-gradient(180deg,#ededff 0%,#e8eaff 100%);
  --toggle-inner:#f0f1ff;
  --toggle-inner-hover:#e8eaff;
  --overlay-bg:rgba(80,85,160,.35);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans Bengali',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ═══ HEADER ═══ */
.header{
  background:var(--header-bg);
  border-bottom:1px solid var(--border);
  padding:18px 24px 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.header::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(124,58,237,.5),rgba(6,182,212,.4),rgba(232,121,249,.4),transparent);
}

.brand-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.2rem, 5vw, 1.6rem);
  font-weight:700;
  letter-spacing:.08em;
  line-height:1;
  white-space:nowrap;
  margin-bottom: 5px;
}
.brand-static{
  background:var(--g1);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 18px rgba(124,58,237,.35));
}
.brand-pro{
  display:inline-block;
  background:linear-gradient(90deg, #7c3aed 0%,#06b6d4 20%,#e879f9 40%,#f43f5e 55%,#f59e0b 70%,#10b981 85%,#7c3aed 100%);
  background-size:300% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:proShift 3s linear infinite;
  filter:drop-shadow(0 0 10px rgba(232,121,249,.5));
}
@keyframes proShift{
  0%  {background-position:0% center}
  100%{background-position:300% center}
}

/* ═══ TOGGLE BUTTON ═══ */
.toggle-wrap{
  display:flex;
  justify-content:center;
  margin:20px 0 0;
}
.toggle-btn{
  position:relative;
  width:clamp(280px,80vw,460px);
  height:62px;
  border-radius:9999px;
  border:none;
  cursor:pointer;
  padding:2px;
  background:var(--g2);
  outline:none;
  overflow:hidden;
}
.toggle-inner{
  width:100%;height:100%;
  border-radius:9999px;
  background:var(--toggle-inner);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  position:relative;
  transition:background .3s;
}
.toggle-label-clip{
  position:absolute;
  inset:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  border-radius:9999px;
}
.toggle-label{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1rem,3.8vw,1.25rem);
  font-weight:900;
  letter-spacing:.08em;
  display:flex;align-items:center;justify-content:center;
  gap:clamp(8px,2vw,18px);
  white-space:nowrap;
  position:absolute;
  inset:0;
  padding:0 20px;
  will-change:transform,opacity;
}
.toggle-arrow{
  display:inline-block;
  font-family:monospace;
  font-size:1.15em;
  background:var(--g2);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
#lFrom,#lTo{
  background:var(--g2);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

@keyframes slideUp{
  from{ transform:translateY(0);    opacity:1 }
  to  { transform:translateY(-105%);opacity:0 }
}
@keyframes slideDown{
  from{ transform:translateY(105%); opacity:0 }
  to  { transform:translateY(0);    opacity:1 }
}
.toggle-label.anim-exit { animation:slideUp   .2s  cubic-bezier(.3,0,.7,1)   forwards }
.toggle-label.anim-enter{ animation:slideDown .32s cubic-bezier(.25,.8,.25,1) forwards }

.t-ripple{
  position:absolute;border-radius:50%;
  background:rgba(124,58,237,.2);
  transform:scale(0);
  animation:ripple .55s ease-out forwards;
  pointer-events:none;z-index:1;
}
@keyframes ripple{to{transform:scale(5);opacity:0}}

@media(max-width:480px){
  .toggle-btn{width:calc(100vw - 28px);height:54px}
  .toggle-label{font-size:.9rem;letter-spacing:.05em;gap:8px;padding:0 14px}
}

/* ═══ MAIN ═══ */
.main{
  max-width:600px;
  margin:0 auto;
  padding:20px 16px 20px;
  flex:1;
  width:100%;
}

/* ═══ INPUT CARD ═══ */
.card{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:0 8px 40px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.06);
  overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.card:focus-within{
  border-color:rgba(124,58,237,.4);
  box-shadow:0 8px 40px rgba(0,0,0,.3);
}
.card-toolbar{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  padding:14px 20px 12px;
  border-bottom:1px solid var(--border);
  background:var(--toolbar-bg);
}
.icon-btn{
  width:42px;height:42px;
  border-radius:12px;
  border:1px solid var(--border-hi);
  background:var(--surface2);
  color:var(--muted);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.icon-btn svg{width:18px;height:18px;stroke-width:1.8;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
.icon-btn:hover{
  background:rgba(124,58,237,.12);
  border-color:rgba(124,58,237,.45);
  color:var(--em);
  transform:translateY(-2px);
}
.icon-btn:active{transform:translateY(0) scale(.94)}
.icon-btn.danger:hover{
  background:rgba(239,68,68,.1);
  border-color:rgba(239,68,68,.35);
  color:var(--red);
}

.theme-btn{
  position:absolute;
  top:16px;right:16px;
  width:38px;height:38px;
  border-radius:50%;
  border:1px solid var(--border-hi);
  background:var(--surface2);
  color:var(--muted);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .22s;
  z-index:10;
}
.theme-btn:hover{
  background:rgba(124,58,237,.14);
  border-color:rgba(124,58,237,.5);
  color:var(--em);
}
.theme-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.icon-moon{display:block}
.icon-sun{display:none}
html.light .icon-moon{display:none}
html.light .icon-sun{display:block}

.card textarea{
  width:100%;
  min-height:220px;
  background:transparent;
  border:none;outline:none;
  color:var(--text);
  font-family:'Noto Sans Bengali',sans-serif;
  font-size:1.05rem;
  line-height:1.75;
  padding:16px 20px;
  resize:none;
}
.card textarea::placeholder{color:var(--dim)}

.card-footer{
  padding:10px 18px;
  border-top:1px solid var(--border);
  font-size:.78rem;
  color:var(--dim);
  display:flex;justify-content:space-between;
  align-items:center;
}

/* ═══ CONVERT BUTTON ═══ */
.convert-wrap{
  display:flex;justify-content:center;
  margin:24px 0 0;
}
.convert-btn{
  padding:14px 60px;
  border-radius:9999px;
  border:none;
  background:var(--g1);
  color:#fff;
  font-family:'Cinzel Decorative',serif;
  font-size:.85rem;
  font-weight:700;
  letter-spacing:.14em;
  cursor:pointer;
  transition:all .22s;
  box-shadow:0 4px 24px rgba(124,58,237,.4);
}
.convert-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,.55)}
.convert-btn:active{transform:translateY(0) scale(.97)}
.convert-btn.loading{opacity:.65;pointer-events:none}

/* ═══ OUTPUT POPUP ═══ */
.overlay{
  position:fixed;inset:0;
  background:var(--overlay-bg);
  backdrop-filter:blur(6px);
  z-index:900;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  opacity:0;pointer-events:none;
  transition:opacity .25s;
}
.overlay.open{opacity:1;pointer-events:all}

.popup{
  background:var(--popup-bg);
  border:1px solid rgba(124,58,237,.25);
  border-radius:22px;
  box-shadow:0 24px 80px rgba(0,0,0,.35);
  width:100%;max-width:560px;
  max-height:80vh;
  display:flex;flex-direction:column;
  transform:translateY(28px) scale(.95);
  transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .25s;
  opacity:0;
  overflow:hidden;
}
.overlay.open .popup{transform:translateY(0) scale(1);opacity:1}

.popup-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
  background:var(--popup-head-bg);
  border-bottom:1px solid var(--border);
  gap:10px;
}
.popup-title{
  font-size:.85rem;font-weight:600;letter-spacing:.06em;
  color:var(--em);
  display:flex;align-items:center;gap:7px;
}
.popup-title svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;}

.nibras-badge{
  display:flex;align-items:center;
  background:linear-gradient(135deg,rgba(124,58,237,.12) 0%,rgba(6,182,212,.1) 100%);
  border:1px solid rgba(124,58,237,.28);
  border-radius:9999px;
  padding:4px 11px;
  gap:5px;
}
.nibras-badge-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--g1);
}
.nibras-badge-text{
  font-size:.65rem;font-weight:600;
  letter-spacing:.08em;
  background:var(--g1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.popup-close{
  width:32px;height:32px;
  border-radius:8px;
  border:1px solid var(--border-hi);
  background:var(--surface2);
  color:var(--muted);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.popup-close:hover{background:rgba(239,68,68,.12);color:var(--red)}

.popup-body{
  flex:1;overflow-y:auto;padding:18px 20px;
}
.popup-text{
  font-size:1.05rem;line-height:1.8;
  color:var(--text);
  white-space:pre-wrap;word-break:break-word;
  min-height:100px;
  user-select: all;
  -webkit-user-select: all;
}
.popup-text.bijoy{font-family:'SutonnyMJ','SutonnyOMJ',serif}

.popup-footer{
  padding:14px 18px;
  border-top:1px solid var(--border);
  background:var(--popup-head-bg);
  display:flex;align-items:center;justify-content:center;
}
.popup-actions{display:flex;gap:12px;justify-content:center;width:100%;}

.p-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 24px;
  border-radius:9999px;
  border:1px solid var(--border-hi);
  background:var(--surface2);
  color:var(--muted);
  font-family:'Noto Sans Bengali',sans-serif;
  font-size:.8rem;font-weight:500;
  cursor:pointer;
  transition:all .18s;
  flex: 1;
  justify-content: center;
}
.p-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;}
.p-btn.copy:hover{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.4);color:var(--em)}
.p-btn.clear-out:hover{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.35);color:var(--red)}
.p-btn.success{background:var(--g3);border-color:var(--em);color:#fff}

/* ═══ FOOTER ═══ */
footer{
  text-align:center;
  padding:18px 16px;
  font-size:.75rem;
  color:var(--dim);
  border-top:1px solid var(--border);
  letter-spacing:.04em;
  margin-top: auto;
}
footer span{background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:600}

.theme-fade{
  position:fixed;inset:0;
  background:#07080f;
  pointer-events:none;
  z-index:99999;
  opacity:0;
}

/* ═══ TOAST ═══ */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--g3);color:#fff;
  padding:10px 24px;border-radius:12px;
  font-size:.85rem;font-weight:500;
  opacity:0;
  transition:opacity .25s, transform .25s;pointer-events:none;
  z-index:9999;box-shadow:0 6px 24px rgba(124,58,237,.4);
  white-space: nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:linear-gradient(135deg,#e11d48,#f43f5e);box-shadow:0 6px 24px rgba(244,63,94,.4)}
</style>
</head>
<body>
<div class="theme-fade" id="themeFade"></div>

<div class="header">
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>
  <div class="brand-title"><span class="brand-static">Bijoy Converter </span><span class="brand-pro">Pro</span></div>

  <div class="toggle-wrap">
    <button class="toggle-btn" id="toggleBtn" onclick="handleToggle(event)" aria-label="Switch mode">
      <div class="toggle-inner">
        <div class="toggle-label-clip">
          <div class="toggle-label" id="toggleLabel">
            <span id="lFrom">UNICODE</span>
            <span class="toggle-arrow">→</span>
            <span id="lTo">BIJOY</span>
          </div>
        </div>
      </div>
    </button>
  </div>
</div>

<div class="main">
  <div class="card" id="inputCard">
    <div class="card-toolbar">
      <button class="icon-btn" onclick="copyInput(this)" aria-label="Copy">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <button class="icon-btn" onclick="pasteInput()" aria-label="Paste">
        <svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
      </button>
      <button class="icon-btn danger" onclick="clearInput()" aria-label="Clear">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>
    <textarea id="inputBox" placeholder="এখানে টেক্সট লিখুন বা পেস্ট করুন..." oninput="onType()"></textarea>
    <div class="card-footer">
      <span id="charCount">০ অক্ষর</span>
      <span id="modeLabel" style="background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:600;">UNICODE → BIJOY</span>
    </div>
  </div>

  <div class="convert-wrap">
    <button class="convert-btn" id="convertBtn" onclick="doConvert()">CONVERT</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="popup" id="popup">
    <div class="popup-header">
      <div class="popup-title">
        <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><path d="M21 12c0 4.97-4.03 9-9 9S3 16.97 3 12 7.03 3 12 3s9 4.03 9 9z"/></svg>
        <span id="popupTitle">Output — BIJOY</span>
      </div>
      <div class="nibras-badge">
        <div class="nibras-badge-dot"></div>
        <span class="nibras-badge-text">Nibras IT</span>
      </div>
      <button class="popup-close" onclick="closePopup()" aria-label="Close">✕</button>
    </div>
    <div class="popup-body">
      <div class="popup-text" id="outputText"></div>
    </div>
    <div class="popup-footer">
      <div class="popup-actions">
        <button class="p-btn copy" id="popCopyBtn" onclick="copyOutput()">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span class="btn-label">Copy</span>
        </button>
        <button class="p-btn clear-out" onclick="clearOutput()">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Clear
        </button>
      </div>
    </div>
  </div>
</div>

<footer>Powered by <span>Nibras IT</span></footer>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// HIGH-PERFORMANCE CONVERSION ENGINE
// ═══════════════════════════════════════════

var MapU2B = {
    '।' : '|', '০' : '0', '১' : '1', '২' : '2', '৩' : '3', '৪' : '4', '৫' : '5', '৬' : '6', '৭' : '7', '৮' : '8', '৯' : '9',
    'অ' : 'A', 'আ' : 'Av', 'ই' : 'B', 'ঈ' : 'C', 'উ' : 'D', 'ঊ' : 'E', 'ঋ' : 'F', 'এ' : 'G', 'ঐ' : 'H', 'ও' : 'I', 'ঔ' : 'J',
    'ক' : 'K', 'খ' : 'L', 'গ' : 'M', 'ঘ' : 'N', 'ঙ' : 'O', 'চ' : 'P', 'ছ' : 'Q', 'জ' : 'R', 'ঝ' : 'S', 'ঞ' : 'T',
    'ট' : 'U', 'ঠ' : 'V', 'ড' : 'W', 'ঢ' : 'X', 'ণ' : 'Y', 'ত' : 'Z', 'থ' : '_', 'দ' : '`', 'ধ' : 'a', 'ন' : 'b',
    'প' : 'c', 'ফ' : 'd', 'ব' : 'e', 'ভ' : 'f', 'ম' : 'g', 'য' : 'h', 'র' : 'i', 'ল' : 'j', 'শ' : 'k', 'ষ' : 'l',
    'স' : 'm', 'হ' : 'n', 'ড়' : 'o', 'ঢ়' : 'p', 'য়' : 'q', 'ৎ' : 'r', 'ং' : 's', 'ঃ' : ':', 'ঁ' : 't',
    'া' : 'v', 'ি' : 'w', 'ী' : 'x', 'ু' : 'y', 'ূ' : 'z', 'ৃ' : '„', 'ে' : '†', 'ৈ' : '‡', 'ো' : '†v', 'ৌ' : '†y', '্' : '&'
};

var MapB2U = {
    '0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯','|':'।',
    'A':'অ','Av':'আ','B':'ই','C':'ঈ','D':'উ','E':'ঊ','F':'ঋ','G':'এ','H':'ঐ','I':'ও','J':'ঔ',
    'K':'ক','L':'খ','M':'গ','N':'ঘ','O':'ঙ','P':'চ','Q':'ছ','R':'জ','S':'ঝ','T':'ঞ',
    'U':'ট','V':'ঠ','W':'ড','X':'ঢ','Y':'ণ','Z':'ত','_':'থ','`':'দ','a':'ধ','b':'ন',
    'c':'প','d':'ফ','e':'ব','f':'ভ','g':'ম','h':'য','i':'র','j':'ল','k':'শ','l':'ষ',
    'm':'স','n':'হ','o':'ড়','p':'ঢ়','q':'য়','r':'ৎ','s':'ং',':':'ঃ','t':'ঁ',
    'v':'া','w':'ি','x':'ী','y':'ু','z':'ূ','„':'ৃ','†':'ে','‡':'ৈ','†v':'ো','†y':'ৌ','&':'্'
};

function unicodeToBijoy(text) {
    if (!text) return '';
    
    // প্রি-প্রসেসিং: যুক্তাক্ষর এবং জটিল কম্বিনেশন হ্যান্ডলিং
    let res = text;
    
    // র-ফলা এবং রেফ ফিক্সিং লজিক
    res = res.replace(/র্([ক-হ])/g, '$1œ'); 
    res = res.replace(/([ক-হ])্র/g, 'Ö$1');
    
    // সাধারণ রূপান্তর
    let output = '';
    for (let i = 0; i < res.length; i++) {
        let ch = res[i];
        if (MapU2B[ch] !== undefined) {
            output += MapU2B[ch];
        } else {
            output += ch;
        }
    }
    
    // কার চিহ্নের পজিশন ঠিক করা (পোস্ট-প্রসেসিং)
    // 'ে', 'ি', 'ৈ' ব্যঞ্জনবর্ণের আগে যাবে
    output = output.replace(/([K-Z`a-n])(†|w|‡)/g, '$2$1');
    // 'ো' এবং 'ৌ' স্প্লিট ফিক্স
    output = output.replace(/([K-Z`a-n])(†v)/g, '†$1v');
    output = output.replace(/([K-Z`a-n])(†y)/g, '†$1y');
    
    return output;
}

function bijoyToUnicode(text) {
    if (!text) return '';
    
    let res = text;
    
    // কার চিহ্নগুলোকে সঠিক জায়গায় ফিরিয়ে আনা
    res = res.replace(/†([K-Z`a-n])v/g, '$1ো');
    res = res.replace(/†([K-Z`a-n])y/g, '$1ৌ');
    res = res.replace(/(†|w|‡)([K-Z`a-n])/g, '$2$1');
    
    let output = '';
    for (let i = 0; i < res.length; i++) {
        let ch = res[i];
        if (MapB2U[ch] !== undefined) {
            output += MapB2U[ch];
        } else {
            output += ch;
        }
    }
    
    // রেফ ও র-ফলা ঠিক করা
    output = output.replace(/Ö([ক-হ])/g, '$1্র');
    output = output.replace(/([ক-হ])œ/g, 'র্$1');
    
    return output;
}

// ═══════════════════════════════════════════
// UI STATE & INTERACTION
// ═══════════════════════════════════════════
let mode = 'u2b'; 

function handleToggle(e) {
  const btn = document.getElementById('toggleBtn');
  const ripple = document.createElement('div');
  ripple.className = 't-ripple';
  const rect = btn.getBoundingClientRect();
  const sz = Math.max(rect.width, rect.height);
  const cx = (e.clientX || rect.left + rect.width/2) - rect.left - sz/2;
  const cy = (e.clientY || rect.top + rect.height/2) - rect.top - sz/2;
  ripple.style.cssText=`width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;position:absolute`;
  btn.querySelector('.toggle-inner').appendChild(ripple);
  setTimeout(()=>ripple.remove(), 550);

  mode = mode === 'u2b' ? 'b2u' : 'u2b';

  const label = document.getElementById('toggleLabel');
  label.classList.remove('anim-enter');
  label.classList.add('anim-exit');
  setTimeout(()=>{
    updateLabel();
    label.classList.remove('anim-exit');
    label.classList.add('anim-enter');
  }, 220);

  document.getElementById('modeLabel').textContent = mode === 'u2b' ? 'UNICODE → BIJOY' : 'BIJOY → UNICODE';
  document.getElementById('inputBox').value = '';
  onType();
}

function updateLabel(){
  document.getElementById('lFrom').textContent = mode === 'u2b' ? 'UNICODE' : 'BIJOY';
  document.getElementById('lTo').textContent   = mode === 'u2b' ? 'BIJOY' : 'UNICODE';
}

function onType(){
  const v = document.getElementById('inputBox').value;
  document.getElementById('charCount').textContent = toBn(v.length) + ' অক্ষর';
}

function toBn(n){
  return String(n).replace(/\d/g, d => '০১২৩৪৫৬৭৮৯'[d]);
}

// ═══════════════════════════════════════════
// TOOLBAR & ACTIONS
// ═══════════════════════════════════════════
function copyInput(btn){
  const v = document.getElementById('inputBox').value;
  if(!v){ toast('কপি করার কিছু নেই', true); return; }
  clipboardWrite(v, ()=>{
    if(btn) flashIconBtn(btn);
    toast('ইনপুট কপি হয়েছে ✓');
  });
}

function pasteInput(){
  if(navigator.clipboard && navigator.clipboard.readText){
    navigator.clipboard.readText()
      .then(t => {
        document.getElementById('inputBox').value = t;
        onType();
        toast('पेস্ট হয়েছে ✓');
      })
      .catch(() => focusPaste());
  } else {
    focusPaste();
  }
}

function focusPaste(){
  const box = document.getElementById('inputBox');
  box.focus();
  toast('ইনপুট বক্সে লং-প্রেস করে পেস্ট করুন');
}

function clearInput(){
  const box = document.getElementById('inputBox');
  box.value = '';
  box.focus();
  onType();
  toast('মুছে ফেলা হয়েছে');
}

function doConvert(){
  const inp = document.getElementById('inputBox').value;
  if(!inp.trim()){ toast('প্রথমে টেক্সট লিখুন বা পেস্ট করুন', true); return; }
  const btn = document.getElementById('convertBtn');
  btn.classList.add('loading');
  btn.textContent = 'Converting...';
  
  setTimeout(()=>{
    try{
      const out = mode === 'u2b' ? unicodeToBijoy(inp) : bijoyToUnicode(inp);
      showPopup(out);
    } catch(err){
      toast('কনভার্ট করতে সমস্যা হয়েছে', true);
      console.error(err);
    }
    btn.classList.remove('loading');
    btn.textContent = 'CONVERT';
  }, 80);
}

// ═══════════════════════════════════════════
// POPUP & TOAST
// ═══════════════════════════════════════════
function showPopup(text){
  const el = document.getElementById('outputText');
  el.textContent = text;
  el.className = 'popup-text' + (mode === 'u2b' ? ' bijoy' : '');
  document.getElementById('popupTitle').textContent = mode === 'u2b' ? 'Output — BIJOY' : 'Output — UNICODE';
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePopup(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e){
  if(e.target === document.getElementById('overlay')) closePopup();
}

function copyOutput(){
  const t = document.getElementById('outputText').textContent;
  if(!t){ toast('কপি করার কিছু নেই', true); return; }
  const btn = document.getElementById('popCopyBtn');
  clipboardWrite(t, ()=>{
    btn.classList.add('success');
    const svg = btn.querySelector('svg');
    const label = btn.querySelector('.btn-label');
    if(svg) svg.style.display = 'none';
    if(label) label.textContent = 'Copied!';
    toast('আউটপুট কপি হয়েছে ✓');
    setTimeout(()=>{
      btn.classList.remove('success');
      if(svg) svg.style.display = '';
      if(label) label.textContent = 'Copy';
    }, 2000);
  });
}

function clearOutput(){
  document.getElementById('outputText').textContent = '';
  closePopup();
}

function clipboardWrite(text, onSuccess){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(onSuccess).catch(() => legacyCopy(text, onSuccess));
  } else {
    legacyCopy(text, onSuccess);
  }
}

function legacyCopy(text, onSuccess){
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if(ok && onSuccess) onSuccess();
    else toast('কপি করা সম্ভব হয়নি', true);
  } catch(e){
    toast('কপি করা সম্ভব হয়নি', true);
  }
}

function flashIconBtn(btn){
  if(!btn) return;
  btn.style.background = 'rgba(124,58,237,.2)';
  setTimeout(()=>{
    btn.style.background = '';
  }, 800);
}

let tt;
function toast(msg, err=false){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(tt);
  tt = setTimeout(()=> el.classList.remove('show'), 2400);
}

// ═══════════════════════════════════════════
// THEME TOGGLE WITH SMOOTH TRANSITION
// ═══════════════════════════════════════════
function toggleTheme(){
  const doc  = document.documentElement;
  const fade = document.getElementById('themeFade');
  const goingLight = !doc.classList.contains('light');

  fade.style.background = goingLight ? '#f3f4ff' : '#07080f';
  fade.style.opacity    = '1';
  fade.style.transition = 'opacity .22s ease';

  setTimeout(() => {
    doc.classList.toggle('light');
    localStorage.setItem('bcp-theme', doc.classList.contains('light') ? 'light' : 'dark');
    fade.style.opacity    = '0';
    fade.style.transition = 'opacity .3s ease';
  }, 230);
}

(function(){
  if(localStorage.getItem('bcp-theme') === 'light'){
    document.documentElement.classList.add('light');
  }
})();
</script>
